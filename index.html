<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Control de Acceso - INTI</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        /* ==========================================================================
           1. ESTILOS GLOBALES Y PALETA DE COLORES (VERDE Y AMARILLO INSTITUCIONAL)
           ========================================================================== */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        h1, h2 {
            color: #00563B; /* Verde principal */
            text-align: center;
        }

        /* Enfoque de dos columnas: Izquierda Escáner, Derecha Reportes */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
        }

        /* ==========================================================================
           2. ESTILOS DEL ESCÁNER QR
           ========================================================================== */
        .scanner-section {
            background: #fafafa;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            text-align: center;
        }

        #reader {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        /* ==========================================================================
           3. ESTILOS DE LAS ALERTAS PERSONALIZADAS (CENTRADAS Y TEMPORALES)
           ========================================================================== */
        .custom-alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Centrado absoluto exacto */
            padding: 20px 40px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 9999;
            display: none; /* Oculto por defecto */
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        /* Variaciones de color para la alerta */
        .alert-success { background-color: #00563B; border: 2px solid #FFD700; } /* Verde con borde Amarillo */
        .alert-error { background-color: #d9534f; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -60%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        /* ==========================================================================
           4. ESTILOS DEL APARTADO DE REPORTES Y TABLA
           ========================================================================== */
        .report-section {
            background: #ffffff;
        }

        .header-reportes {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        /* Botón de Impresión Estilizado */
        .btn-imprimir {
            background-color: #FFD700; /* Amarillo Institucional */
            color: #00563B;            /* Texto Verde para contraste */
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn-imprimir:hover {
            background-color: #e6c200;
            transform: translateY(-1px);
        }

        /* Tabla de registros */
        .table-responsive {
            max-height: 450px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eeeeee;
        }

        th {
            background-color: #00563B;
            color: white;
            position: sticky;
            top: 0; /* Mantiene el encabezado fijo al hacer scroll */
        }

        tr:nth-child(even) { background-color: #f9f9f9; }

        /* ==========================================================================
           5. REGLAS DE IMPRESIÓN (MEDIOS FÍSICOS / PDF)
           ========================================================================== */
        @media print {
            /* Ocultamos absolutamente todo lo que no sea el reporte */
            body, .container, .dashboard {
                background: white;
                box-shadow: none;
                padding: 0;
                margin: 0;
            }
            /* Escondemos el escáner, el botón de imprimir y los encabezados de la app */
            .scanner-section, .btn-imprimir, h1, .header-reportes h2 {
                display: none !important;
            }
            /* Forzamos a la sección de reportes a ocupar todo el ancho de la hoja */
            .report-section {
                width: 100%;
                position: absolute;
                top: 0;
                left: 0;
            }
            .table-responsive {
                max-height: none; /* Quitamos el scroll para que se impriman todas las filas */
                overflow: visible;
            }
            table {
                width: 100%;
                border: 1px solid #000;
            }
            th {
                background-color: #00563B !important;
                color: black !important; /* Algunos navegadores bloquean fondo a color al imprimir */
            }
        }
    </style>
</head>
<body>

    <div id="alertaPersonalizada" class="custom-alert"></div>

    <div class="container">
        <h1>Instituto Nacional Técnico Industrial (INTI)</h1>
        <p style="text-align:center; color: #666;">Control de Asistencia de Estudiantes</p>
        
        <div class="dashboard">
            
            <div class="scanner-section">
                <h2>Escáner de Credenciales</h2>
                <div id="reader"></div>
            </div>

            <div class="report-section">
                <div class="header-reportes">
                    <h2>Registros de Hoy</h2>
                    <button class="btn-imprimir" onclick="imprimirReporte()">
                        🖨️ Imprimir Reporte
                    </button>
                </div>

                <div class="table-responsive">
                    <table id="tablaAsistencia">
                        <thead>
                            <tr>
                                <th>NIE / Código</th>
                                <th>Nombre</th>
                                <th>Especialidad</th>
                                <th>Año</th>
                                <th>Hora de Entrada</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        // Importación de módulos oficiales del SDK de Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIGURACIÓN DE TU PROYECTO FIREBASE (Coloca aquí tus llaves actuales)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_AUTH_DOMAIN",
            databaseURL: "TU_DATABASE_URL",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_STORAGE_BUCKET",
            messagingSenderId: "TU_MESSAGING_SENDER_ID",
            appId: "TU_APP_ID"
        };

        // Inicializamos la conexión a Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const asistenciaRef = ref(db, 'asistencia'); // Nodo principal de base de datos

        /* ==========================================================================
           VARIABLES DE CONTROL DE FLUJO (PREVENCIÓN DE DUPLICADOS)
           ========================================================================== */
        let ultimoCodigoEscaneado = null;
        let tiempoUltimoEscaneo = 0;
        const COOLDOWN_TIEMPO = 5000; // 5 segundos de espera antes de volver a leer el mismo QR

        /* ==========================================================================
           FUNCIÓN: MOSTRAR ALERTAS CENTRADAS Y TEMPORALES
           ========================================================================== */
        function mostrarAlerta(mensaje, tipo = 'success') {
            const alerta = document.getElementById('alertaPersonalizada');
            alerta.innerText = mensaje;
            
            // Quitamos clases previas y agregamos la nueva correspondiente
            alerta.className = 'custom-alert';
            if(tipo === 'success') alerta.classList.add('alert-success');
            else alerta.classList.add('alert-error');

            alerta.style.display = 'block'; // Hacemos visible la alerta

            // Desaparece automáticamente después de 2.5 segundos sin intervención del usuario
            setTimeout(() => {
                alerta.style.display = 'none';
            }, 2500);
        }

        /* ==========================================================================
           PROCESAMIENTO DEL CÓDIGO QR ESCANEADO
           ========================================================================== */
        function alDetectarQR(textoQR) {
            const ahora = Date.now();

            try {
                // Parseamos los datos del QR (asumiendo formato JSON nativo de las credenciales)
                const alumno = JSON.parse(textoQR);
                
                // Extraemos los campos requeridos del QR institucional
                const codigo = alumno.code || alumno.codigo;
                const nombre = alumno.name || alumno.nombre;
                const especialidad = alumno.specialty || alumno.especialidad;
                const year = alumno.year;
                const email = alumno.email;

                // VALIDACIÓN ANTIDUPLICADOS: Evita que un rebotador de cámara registre dos veces seguidas
                if (codigo === ultimoCodigoEscaneado && (ahora - tiempoUltimoEscaneo) < COOLDOWN_TIEMPO) {
                    console.log("Escaneo duplicado ignorado temporalmente.");
                    return; 
                }

                // Actualizamos las variables de control con el último registro procesado con éxito
                ultimoCodigoEscaneado = codigo;
                tiempoUltimoEscaneo = ahora;

                // Generamos la marca de tiempo legible de El Salvador
                const opcionesFecha = { timeZone: 'America/San_Salvador', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
                const horaActual = new Date().toLocaleTimeString('es-SV', opcionesFecha);

                // Construimos el objeto final que viajará hacia Firebase Realtime Database
                const registroAsistencia = {
                    codigo: codigo,
                    nombre: nombre,
                    especialidad: especialidad,
                    year: year,
                    email: email,
                    timestamp: horaActual
                };

                // Subimos de forma persistente los datos a la nube
                push(asistenciaRef, registroAsistencia)
                    .then(() => {
                        mostrarAlerta(`✅ Entrada Registrada: ${nombre}`, 'success');
                    })
                    .catch((error) => {
                        console.error(error);
                        mostrarAlerta("❌ Error al guardar en la nube", 'error');
                    });

            } catch (e) {
                // Si el código QR no posee una estructura JSON válida, maneja la alerta de error
                if (ahora - tiempoUltimoEscaneo > COOLDOWN_TIEMPO) {
                    mostrarAlerta("❌ Código QR no reconocido por el sistema INTI", 'error');
                    tiempoUltimoEscaneo = ahora;
                }
            }
        }

        /* ==========================================================================
           INICIALIZACIÓN DE LA CÁMARA LECTORA
           ========================================================================== */
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 15,          // Velocidad de lectura de fotogramas por segundo
            qrbox: { width: 250, height: 250 } // Área visible de enfoque del escáner
        });
        
        // Ejecutamos el inicio de captura del flujo de video
        html5QrcodeScanner.render(alDetectarQR);

        /* ==========================================================================
           RENDERIZACIÓN DE REPORTES DESDE FIREBASE (TABLA EN TIEMPO REAL)
           ========================================================================== */
        onValue(asistenciaRef, (snapshot) => {
            const cuerpoTabla = document.getElementById("cuerpoTabla");
            cuerpoTabla.innerHTML = ""; // Limpieza total para redibujar evitando registros duplicados visuales

            if (snapshot.exists()) {
                const datos = snapshot.val();
                
                // Recorremos secuencialmente los identificadores de registros generados por push()
                Object.keys(datos).forEach((id) => {
                    const registro = datos[id];
                    const fila = document.createElement("tr");
                    
                    fila.innerHTML = `
                        <td><b>${registro.codigo || 'N/A'}</b></td>
                        <td>${registro.nombre || 'N/A'}</td>
                        <td>${registro.especialidad || 'N/A'}</td>
                        <td>${registro.year || '-'}° Año</td>
                        <td>${registro.timestamp || 'N/A'}</td>
                    `;
                    cuerpoTabla.appendChild(fila);
                });
            } else {
                cuerpoTabla.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999;">Esperando primeros registros...</td></tr>`;
            }
        });

        /* ==========================================================================
           FUNCIÓN ACCIONADORA: IMPRIMIR REPORTE
           ========================================================================== */
        window.imprimirReporte = function() {
            // Dispara el controlador nativo del sistema operativo para impresión física o guardado en PDF
            window.print();
        };
    </script>
</body>
</html>
